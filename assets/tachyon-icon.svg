<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ibg" cx="52%" cy="40%" r="65%">
      <stop offset="0" stop-color="#12202e"/>
      <stop offset="1" stop-color="#040507"/>
    </radialGradient>
    <linearGradient id="istreak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5cc8ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#8fe0ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="iglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <!-- full-bleed square; macOS applies its own squircle mask -->
  <rect width="1024" height="1024" fill="url(#ibg)"/>

  <!-- faster-than-light after-images -->
  <g fill="#e6eff9" transform="translate(512,512) scale(1.7) translate(-256,-256)">
    <g opacity="0.05" transform="translate(-52,0)">
      <rect x="150" y="158" width="212" height="42" rx="21"/>
      <rect x="235" y="158" width="42" height="214" rx="21"/>
    </g>
    <g opacity="0.11" transform="translate(-28,0)">
      <rect x="150" y="158" width="212" height="42" rx="21"/>
      <rect x="235" y="158" width="42" height="214" rx="21"/>
    </g>
    <rect x="150" y="171" width="205" height="16" rx="8" fill="url(#istreak)"/>
    <g fill="#f2f7fc">
      <rect x="150" y="158" width="212" height="42" rx="21"/>
      <rect x="235" y="158" width="42" height="214" rx="21"/>
    </g>
  </g>

  <!-- the tachyon particle at the crossbar's leading tip (icon space) -->
  <circle cx="692" cy="381" r="60" fill="#5cc8ff" opacity="0.45" filter="url(#iglow)"/>
  <circle cx="692" cy="381" r="26" fill="#f4fbff"/>
  <circle cx="692" cy="381" r="12" fill="#ffffff"/>
</svg>
