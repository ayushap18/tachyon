<svg width="1100" height="300" viewBox="0 0 1100 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wstreak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5cc8ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#8fe0ff" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="wglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1100" height="300" rx="36" fill="#060709"/>

  <!-- wordmark: monospace, tracked, tying to the terminal aesthetic -->
  <text x="550" y="150" text-anchor="middle" dominant-baseline="central"
        font-family="'SF Mono','JetBrains Mono','Menlo',monospace" font-size="112"
        font-weight="600" letter-spacing="16" fill="#f2f7fc">TACHYON</text>

  <!-- particle streak running beneath the word, faster than light -->
  <rect x="250" y="214" width="560" height="6" rx="3" fill="url(#wstreak)"/>
  <circle cx="812" cy="217" r="18" fill="#5cc8ff" opacity="0.5" filter="url(#wglow)"/>
  <circle cx="812" cy="217" r="8" fill="#f4fbff"/>
  <circle cx="812" cy="217" r="4" fill="#ffffff"/>
</svg>
