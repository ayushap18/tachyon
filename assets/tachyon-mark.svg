<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="52%" cy="40%" r="62%">
      <stop offset="0" stop-color="#0e1a24"/>
      <stop offset="1" stop-color="#040507"/>
    </radialGradient>
    <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5cc8ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#8fe0ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- near-black backdrop -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- faster-than-light after-images: the T trailing to the left -->
  <g fill="#e6eff9">
    <g opacity="0.05" transform="translate(-52,0)">
      <rect x="150" y="158" width="212" height="42" rx="21"/>
      <rect x="235" y="158" width="42" height="214" rx="21"/>
    </g>
    <g opacity="0.11" transform="translate(-28,0)">
      <rect x="150" y="158" width="212" height="42" rx="21"/>
      <rect x="235" y="158" width="42" height="214" rx="21"/>
    </g>
  </g>

  <!-- light trail feeding into the particle -->
  <rect x="150" y="171" width="205" height="16" rx="8" fill="url(#streak)"/>

  <!-- the T -->
  <g fill="#f2f7fc">
    <rect x="150" y="158" width="212" height="42" rx="21"/>
    <rect x="235" y="158" width="42" height="214" rx="21"/>
  </g>

  <!-- the tachyon: leading particle at the crossbar's right tip -->
  <circle cx="362" cy="179" r="34" fill="#5cc8ff" opacity="0.45" filter="url(#glow)"/>
  <circle cx="362" cy="179" r="15" fill="#f4fbff"/>
  <circle cx="362" cy="179" r="7" fill="#ffffff"/>
</svg>
