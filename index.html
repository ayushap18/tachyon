<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tachyon</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="terminal"></div>
    <div id="ai-bar" hidden>
      <span id="ai-icon">✦</span>
      <input id="ai-input" placeholder="Describe a command…" />
      <span id="ai-status"></span>
    </div>
    <div id="status-bar"><span id="status-vim"></span><span id="status-cwd"></span><span id="status-git"></span></div>
    <button id="settings-btn" title="Settings (⌘,)">⚙</button>
    <div id="settings" hidden>
      <label>Theme <select id="theme-select"></select></label>
      <label>Font <select id="font-select"></select></label>
      <label>Size <input id="font-size" type="number" min="9" max="28" /></label>
    </div>
    <div id="palette" hidden>
      <input id="palette-input" placeholder="Search actions, providers, history…" />
      <ul id="palette-list"></ul>
    </div>
    <div id="blocks" hidden tabindex="-1">
      <div id="blocks-header">
        <span id="blocks-title">Blocks</span>
        <button id="blocks-summarize">✦ summarize session</button>
        <button id="blocks-close" title="Close (Esc)">×</button>
      </div>
      <div id="blocks-summary" hidden></div>
      <div id="blocks-list"></div>
    </div>
    <div id="minimap" hidden></div>
    <input id="vim-search" placeholder="/search" hidden />
  </body>
</html>
